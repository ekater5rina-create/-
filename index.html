<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет наличных средств</title>
    
    <!-- Подключаем React и Tailwind прямо в браузере -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const EMPLOYEES_BY_COMPANY = {
            "Кедресс": [
                "Дмитриев А.Н.",
                "Долматов Ю. М.",
                "Кузина Е. А.",
                "Матвиенко Е.В.",
                "Прокофьева Н.В.",
                "Силин А. И."
            ],
            "ПЛ ГРУПП": [
                "Анохин В.М.",
                "Горбунов В. С.",
                "Долматов Ю. М.",
                "Кочетков А. С.",
                "Мезен Т.В.",
                "Чинцов Ю. А.",
                "Шепилов А.Н."
            ]
        };

        const CATEGORIES_BY_COMPANY = {
            "Кедресс": [
                "Содержание ПК", "Вклады от собственников", "Прочая продажа неликвида", 
                "Зарплата производственного персонала", "Зарплата охраны", "Зарплата административного персонала", 
                "Содержание офиса", "Представительские расходы", "Обслуживание линии", 
                "Оплаты по кредитам и займам", "Командировачные расходы", "Доставка", "Автомобиль", "Упаковка и тара"
            ],
            "ПЛ ГРУПП": [
                "Услуга по перевозке", "Прочие поступления", "Транспортные услуги", "РКО", 
                "Зарплата производственного персонала", "Зарплата водителей", "Зарплата административного персонала", 
                "Зарплата коммерческого персонала", "Обучение персонала", "Расходы на персонал", 
                "Командировочные расходы", "Представительские расходы", "Поиск и найм персонала", 
                "Маркетинговые расходы", "Аудит", "Обслуживание ПК", "Содержание офиса", 
                "Связь, интернет, почтовые расходы", "Обслуживание 1С, ЭДО, сайт", "Автомобиль", 
                "Аренда ПК", "Коммунальные ПК"
            ]
        };

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJdXBKq_CqyAKfEtDTirnyg_kWMX-bX3IQ1h8U6s5LyVpfKiNUUM3yGfA_QxTaE7Yw/exec";

        const LOGOS = {
            "Кедресс": "https://i.yapx.ru/dPovS.png",
            "ПЛ ГРУПП": "https://i.yapx.ru/dPLra.png"
        };

        function App() {
            const [formData, setFormData] = useState({
                company: 'Кедресс',
                employee: '',
                type: 'Расход',
                category: '',
                amount: '',
                comment: '',
                receiptName: '',
                receiptBase64: '',
                receiptType: ''
            });

            const [transactions, setTransactions] = useState([]);
            const [error, setError] = useState('');
            const [success, setSuccess] = useState(false);
            const [isLoading, setIsLoading] = useState(false);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => {
                    const newData = { ...prev, [name]: value };
                    if (name === 'company') {
                        newData.category = '';
                        newData.employee = ''; // Сбрасываем сотрудника при смене компании
                    }
                    return newData;
                });
                setError('');
                setSuccess(false);
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64String = reader.result.split(',')[1];
                        setFormData(prev => ({ 
                            ...prev, 
                            receiptName: file.name,
                            receiptType: file.type,
                            receiptBase64: base64String
                        }));
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                if (!formData.company) return setError('Выберите компанию');
                if (!formData.employee) return setError('Выберите сотрудника');
                if (!formData.category) return setError('Выберите статью расходов');
                if (!formData.amount || formData.amount <= 0) return setError('Введите корректную сумму');
                if (!formData.comment.trim()) return setError('Комментарий обязателен для заполнения');

                setIsLoading(true);
                setError('');

                const payloadAmount = formData.type === 'Расход' ? -Math.abs(Number(formData.amount)) : Math.abs(Number(formData.amount));
                
                const payload = {
                    company: formData.company,
                    employeeName: formData.employee,
                    amount: payloadAmount,
                    category: formData.category,
                    comment: formData.comment,
                    file: formData.receiptBase64 ? {
                        base64: formData.receiptBase64,
                        type: formData.receiptType,
                        name: formData.receiptName
                    } : null
                };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });

                    const newTransaction = {
                        ...formData,
                        id: Date.now(),
                        date: new Date().toLocaleString('ru-RU', { 
                            day: '2-digit', month: '2-digit', year: 'numeric', 
                            hour: '2-digit', minute: '2-digit' 
                        })
                    };

                    setTransactions([newTransaction, ...transactions]);
                    
                    setFormData(prev => ({
                        ...prev,
                        type: 'Расход',
                        category: '',
                        amount: '',
                        comment: '',
                        receiptName: '',
                        receiptBase64: '',
                        receiptType: ''
                    }));
                    
                    const fileInput = document.getElementById('receipt-upload');
                    if (fileInput) fileInput.value = '';

                    setSuccess(true);
                    setTimeout(() => setSuccess(false), 3000);
                } catch (err) {
                    setError('Ошибка отправки. Подробности: ' + err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                        
                        {/* Форма */}
                        <div className="lg:col-span-5 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
                            <div className="flex flex-col items-center mb-8">
                                <div className="h-24 w-full flex items-center justify-center mb-4 p-4 bg-slate-50 rounded-xl border border-slate-100">
                                    {formData.company ? (
                                        <img src={LOGOS[formData.company]} alt={`Логотип`} className="max-h-full max-w-full object-contain" />
                                    ) : (
                                        <span className="text-slate-400 font-medium">Логотип компании</span>
                                    )}
                                </div>
                                <h2 className="text-xl font-bold text-slate-800">Учет наличных средств</h2>
                                <p className="text-sm text-slate-500">Заполнение новой операции</p>
                            </div>

                            <form onSubmit={handleSubmit} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-semibold mb-1">🏢 Компания <span className="text-red-500">*</span></label>
                                    <select name="company" value={formData.company} onChange={handleChange} className="w-full p-3 border border-slate-300 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                                        <option value="Кедресс">Кедресс</option>
                                        <option value="ПЛ ГРУПП">ПЛ ГРУПП</option>
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold mb-1">👤 Сотрудник <span className="text-red-500">*</span></label>
                                    <select name="employee" value={formData.employee} onChange={handleChange} className="w-full p-3 border border-slate-300 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                                        <option value="" disabled>Выберите сотрудника...</option>
                                        {EMPLOYEES_BY_COMPANY[formData.company]?.map(emp => <option key={emp} value={emp}>{emp}</option>)}
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold mb-2">Тип операции <span className="text-red-500">*</span></label>
                                    <div className="grid grid-cols-2 gap-3">
                                        <label className={`flex items-center justify-center p-3 rounded-xl border cursor-pointer ${formData.type === 'Приход' ? 'bg-green-50 border-green-500 text-green-700 ring-1 ring-green-500' : 'bg-white text-slate-600'}`}>
                                            <input type="radio" name="type" value="Приход" checked={formData.type === 'Приход'} onChange={handleChange} className="sr-only" />
                                            ⬇️ Приход
                                        </label>
                                        <label className={`flex items-center justify-center p-3 rounded-xl border cursor-pointer ${formData.type === 'Расход' ? 'bg-red-50 border-red-500 text-red-700 ring-1 ring-red-500' : 'bg-white text-slate-600'}`}>
                                            <input type="radio" name="type" value="Расход" checked={formData.type === 'Расход'} onChange={handleChange} className="sr-only" />
                                            ⬆️ Расход
                                        </label>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold mb-1">🏷️ Статья расходов <span className="text-red-500">*</span></label>
                                    <select name="category" value={formData.category} onChange={handleChange} className="w-full p-3 border border-slate-300 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                                        <option value="" disabled>Выберите статью...</option>
                                        {CATEGORIES_BY_COMPANY[formData.company]?.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold mb-1">Сумма (₽) <span className="text-red-500">*</span></label>
                                    <div className="relative">
                                        <input type="number" name="amount" value={formData.amount} onChange={handleChange} placeholder="0.00" min="0" step="0.01" className="w-full p-3 pl-4 pr-12 text-lg font-medium border border-slate-300 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 outline-none" />
                                        <div className="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 font-medium">₽</div>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold mb-1">📄 Комментарий <span className="text-red-500">*</span></label>
                                    <textarea name="comment" value={formData.comment} onChange={handleChange} placeholder="Укажите назначение платежа..." rows="3" className="w-full p-3 border border-slate-300 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold mb-1">📷 Прикрепить чек</label>
                                    <label className="flex flex-col items-center justify-center w-full p-4 border-2 border-dashed border-slate-300 rounded-xl cursor-pointer hover:bg-slate-50 text-slate-500">
                                        <span className="text-sm font-medium">{formData.receiptName ? '📎 ' + formData.receiptName : 'Нажмите, чтобы загрузить файл'}</span>
                                        <input id="receipt-upload" type="file" className="hidden" accept="image/*,.pdf" onChange={handleFileChange} />
                                    </label>
                                </div>

                                {error && <div className="p-3 bg-red-50 text-red-600 border border-red-200 rounded-xl text-sm font-medium">{error}</div>}
                                {success && <div className="p-3 bg-green-50 text-green-700 border border-green-200 rounded-xl text-sm font-medium">✅ Запись успешно добавлена!</div>}

                                <button type="submit" disabled={isLoading} className="w-full py-3.5 px-4 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white font-semibold rounded-xl shadow-sm hover:shadow transition-all flex items-center justify-center gap-2">
                                    {isLoading ? '⏳ Отправка...' : '➕ Записать операцию'}
                                </button>
                            </form>
                        </div>

                        {/* История */}
                        <div className="lg:col-span-7 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[800px]">
                            <div className="p-6 border-b border-slate-100 bg-slate-50/50">
                                <h3 className="text-lg font-bold text-slate-800">🧾 Последние операции {formData.employee ? `(${formData.employee})` : ''}</h3>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 sm:p-6">
                                {transactions.filter(t => t.employee === formData.employee).length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-400 text-center">
                                        <p>{formData.employee ? 'Здесь будут отображаться добавленные сейчас записи' : 'Выберите сотрудника, чтобы увидеть его операции'}</p>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {transactions.filter(t => t.employee === formData.employee).map((t) => (
                                            <div key={t.id} className="p-4 sm:p-5 border border-slate-100 rounded-xl bg-white shadow-sm">
                                                <div className="flex justify-between items-start mb-3 gap-4">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center p-1.5 border border-slate-200 shrink-0">
                                                            <img src={LOGOS[t.company]} alt={t.company} className="max-h-full max-w-full object-contain"/>
                                                        </div>
                                                        <div>
                                                            <p className="font-bold text-slate-800">{t.employee}</p>
                                                            <p className="text-xs text-slate-500">{t.date} • {t.company}</p>
                                                        </div>
                                                    </div>
                                                    <div className={`px-3 py-1 rounded-full text-sm font-bold flex items-center gap-1 shrink-0 ${t.type === 'Приход' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                        {t.type === 'Приход' ? '+' : '-'}{Number(t.amount).toLocaleString('ru-RU')} ₽
                                                    </div>
                                                </div>
                                                
                                                <div className="mb-2">
                                                    <span className="inline-block px-2 py-1 bg-slate-100 text-slate-600 text-xs font-medium rounded-md">{t.category}</span>
                                                </div>

                                                <div className="text-sm text-slate-600 bg-slate-50 p-3 rounded-lg border border-slate-100">
                                                    <span className="font-semibold block mb-1">Комментарий:</span>
                                                    {t.comment}
                                                </div>

                                                {t.receiptName && (
                                                    <div className="mt-3 flex items-center gap-2 text-xs text-blue-600">
                                                        📷 Чек прикреплен: {t.receiptName}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
